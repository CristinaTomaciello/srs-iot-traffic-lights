[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 200000   # ↑ ~3 min a 1000 msg/s per output
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "0s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://haproxy-1:1883", "tcp://haproxy-2:1883"]
  topics = ["$share/telegraf-workers/telemetry/influx_write"]
  qos = 1
  data_format = "influx"
  max_undelivered_messages = 10000   # ← chiave: non blocca MQTT anche se gli output sono lenti

[[outputs.influxdb_v2]]
  urls = ["http://semafori-tsdb-alpha:8086"]
  token = "supersecrettoken123"
  organization = "srs_org"
  bucket = "traffic_data"
  timeout = "5s"

[[outputs.influxdb_v2]]
  urls = ["http://semafori-tsdb-beta:8086"]
  token = "supersecrettoken123"
  organization = "srs_org"
  bucket = "traffic_data"
  timeout = "5s"
