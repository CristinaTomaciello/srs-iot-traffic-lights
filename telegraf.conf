# =====================================================================
# CONFIGURAZIONE GLOBALE
# =====================================================================
[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "0s"
  # Se ometti 'hostname', Telegraf usa l'ID del container
  omit_hostname = true 

# =====================================================================
# INPUT: Legge da MQTT sfruttando il Line Protocol inviato dal worker
# =====================================================================
[[inputs.mqtt_consumer]]
  # Array di failover: se haproxy-1 cade, Telegraf prova haproxy-2
  servers = ["tcp://haproxy-1:1883", "tcp://haproxy-2:1883"]
  
  # $share permette ai due Telegraf di dividersi il carico (MQTT v5)
  topics = [
    "$share/telegraf-workers/telemetry/influx_write"
  ]
  qos = 1
  
  # Il worker invia già il formato nativo InfluxDB (Line Protocol)
  data_format = "influx"

# =====================================================================
# OUTPUT 1: Scrive sul DB Alpha
# =====================================================================
[[outputs.influxdb_v2]]
  urls = ["http://semafori-tsdb-alpha:8086"]
  token = "supersecrettoken123"
  organization = "srs_org"
  bucket = "traffic_data"
  # Timeout per evitare colli di bottiglia
  timeout = "5s"

# =====================================================================
# OUTPUT 2: Scrive sul DB Beta in parallelo
# =====================================================================
[[outputs.influxdb_v2]]
  urls = ["http://semafori-tsdb-beta:8086"]
  token = "supersecrettoken123"
  organization = "srs_org"
  bucket = "traffic_data"
  timeout = "5s"
