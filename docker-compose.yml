version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: semafori-mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # --- NUOVO DATABASE TIME-SERIES ---
  influxdb:
    image: influxdb:2.7
    container_name: semafori-tsdb
    ports:
      - "8086:8086" # Porta standard di InfluxDB
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      # Configurazioni di base automatiche per InfluxDB 2.x
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=srs_org
      - DOCKER_INFLUXDB_INIT_BUCKET=traffic_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken123
      - DOCKER_INFLUXDB_INIT_RETENTION=14d 
    restart: unless-stopped