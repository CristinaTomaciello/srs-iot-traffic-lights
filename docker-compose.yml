networks:
  srs-net:
    driver: bridge

services:
  # =========================================================
  # 1. DATABASE & CACHE
  # =========================================================
  semafori-tsdb-alpha:
    image: influxdb:2.7
    container_name: semafori-tsdb-1
    networks:
      - srs-net
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=passwordsrs123
      - DOCKER_INFLUXDB_INIT_ORG=srs_org
      - DOCKER_INFLUXDB_INIT_BUCKET=traffic_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken123
    volumes:
      - ./influxdb_alpha_data:/var/lib/influxdb2
    restart: unless-stopped

  semafori-tsdb-beta:
    image: influxdb:2.7
    container_name: semafori-tsdb-2
    networks:
      - srs-net
    ports:
      - "8087:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=passwordsrs123
      - DOCKER_INFLUXDB_INIT_ORG=srs_org
      - DOCKER_INFLUXDB_INIT_BUCKET=traffic_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken123
    volumes:
      - ./influxdb_beta_data:/var/lib/influxdb2
    restart: unless-stopped

  redis-lock-1:
    image: redis:alpine
    command: redis-server --save "" --appendonly no
    networks:
      - srs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  redis-lock-2:
    image: redis:alpine
    command: redis-server --save "" --appendonly no
    networks:
      - srs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  redis-lock-3:
    image: redis:alpine
    command: redis-server --save "" --appendonly no
    networks:
      - srs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # =========================================================
  # 2. CORE SYSTEM (UI, Simulatore, Controller, MQTT)
  # =========================================================
  srs-ui:
    build:
      context: .
      dockerfile: simulator/webapp/Dockerfile.ui
    container_name: srs_ui
    networks:
      - srs-net
    ports:
      - "8080:8080"
    depends_on:
      - haproxy-1
      - haproxy-2
    restart: unless-stopped

  srs-simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile.nodo
    container_name: srs_nodes_simulator
    networks:
      - srs-net
    depends_on:
      - haproxy-1
      - haproxy-2
    restart: unless-stopped

  srs-controller-alpha:
    build:
      context: .
      dockerfile: controller/Dockerfile.controller
    container_name: srs_controller_alpha
    environment:
      - NODE_NAME=ALPHA
    networks:
      - srs-net
    depends_on:
      - semafori-tsdb-alpha
      - semafori-tsdb-beta
      - haproxy-1
      - haproxy-2
      - redis-lock-1
      - redis-lock-2
      - redis-lock-3
    restart: unless-stopped

  srs-controller-beta:
    build:
      context: .
      dockerfile: controller/Dockerfile.controller
    container_name: srs_controller_beta
    environment:
      - NODE_NAME=BETA
    networks:
      - srs-net
    depends_on:
      - semafori-tsdb-alpha
      - semafori-tsdb-beta
      - haproxy-1
      - haproxy-2
      - redis-lock-1
      - redis-lock-2
      - redis-lock-3
    restart: unless-stopped

  emqx-1:
    image: emqx:5.3
    container_name: srs-emqx-1
    hostname: srs-emqx-1
    networks:
      - srs-net
    ports:
      - "18083:18083"
    environment:
      - EMQX_NODE_NAME=emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net,emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net]
      - EMQX_NODE__COOKIE=srs_secret_cookie
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1883' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  emqx-2:
    image: emqx:5.3
    container_name: srs-emqx-2
    hostname: srs-emqx-2
    networks:
      - srs-net
    ports:
      - "18084:18083"
    environment:
      - EMQX_NODE_NAME=emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net,emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net]
      - EMQX_NODE__COOKIE=srs_secret_cookie
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1883' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  haproxy-1:
    image: haproxy:2.8
    container_name: srs-haproxy-1
    networks:
      - srs-net
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "1883:1883"
    depends_on:
      emqx-1:
        condition: service_healthy
      emqx-2:
        condition: service_healthy
    restart: unless-stopped

  haproxy-2:
    image: haproxy:2.8
    container_name: srs-haproxy-2
    networks:
      - srs-net
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "1884:1883"
    depends_on:
      emqx-1:
        condition: service_healthy
      emqx-2:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================
  # 3. AI LAYER (Bridge, HAProxy-AI, OpenCode)
  # =========================================================
  bridge-1:
    build:
      context: .
      dockerfile: bridge/Dockerfile.bridge
    container_name: bridge_1
    environment:
      - WORKER_ID=1
      - MQTT_BROKER=haproxy-1
      - OPENCODE_URL_1=http://haproxy-ai-1:4096
      - OPENCODE_URL_2=http://haproxy-ai-2:4096
    networks:
      - srs-net
    restart: unless-stopped

  bridge-2:
    build:
      context: .
      dockerfile: bridge/Dockerfile.bridge
    container_name: bridge_2
    environment:
      - WORKER_ID=2
      - MQTT_BROKER=haproxy-1
      - OPENCODE_URL_1=http://haproxy-ai-1:4096
      - OPENCODE_URL_2=http://haproxy-ai-2:4096
    networks:
      - srs-net
    restart: unless-stopped

  bridge-3:
    build:
      context: .
      dockerfile: bridge/Dockerfile.bridge
    container_name: bridge_3
    environment:
      - WORKER_ID=3
      - MQTT_BROKER=haproxy-1
      - OPENCODE_URL_1=http://haproxy-ai-1:4096
      - OPENCODE_URL_2=http://haproxy-ai-2:4096
    networks:
      - srs-net
    restart: unless-stopped

  haproxy-ai-1:
    image: haproxy:2.8
    container_name: srs-haproxy-ai-1
    networks:
      - srs-net
    volumes:
      - ./haproxy_ai_a.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "4096:4096"
    depends_on:
      - opencode-brain-a
      - opencode-brain-b
    restart: unless-stopped

  haproxy-ai-2:
    image: haproxy:2.8
    container_name: srs-haproxy-ai-2
    networks:
      - srs-net
    volumes:
      - ./haproxy_ai_b.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "4097:4096"
    depends_on:
      - opencode-brain-a
      - opencode-brain-b
    restart: unless-stopped

  opencode-brain-a:
    build:
      context: ./opencode
      dockerfile: Dockerfile.opencode
    container_name: srs-opencode-a
    networks:
      - srs-net
    volumes:
      - ./opencode/opencode_a.json:/root/.config/opencode/opencode.json:ro 
    depends_on:
      - haproxy-mcp-a
    environment:
      - OPENCODE_SERVER_PASSWORD=srs
    restart: unless-stopped

  opencode-brain-b:
    build:
      context: ./opencode
      dockerfile: Dockerfile.opencode
    container_name: srs-opencode-b
    networks:
      - srs-net
    volumes:
      - ./opencode/opencode_b.json:/root/.config/opencode/opencode.json:ro 
    depends_on:
      - haproxy-mcp-b
    environment:
      - OPENCODE_SERVER_PASSWORD=srs
    restart: unless-stopped

  # =========================================================
  # 4. MCP LAYER (HAProxy-MCP e Servizi MCP in Replica)
  # =========================================================
  haproxy-mcp-a:
    image: haproxy:2.8
    container_name: srs-haproxy-mcp-a
    networks:
      - srs-net
    volumes:
      - ./haproxy_mcp.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    expose:
      - "8000"
      - "8001"
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - mcp-recovery-service
      - mcp-green-duration-service
    restart: unless-stopped

  haproxy-mcp-b:
    image: haproxy:2.8
    container_name: srs-haproxy-mcp-b
    networks:
      - srs-net
    volumes:
      - ./haproxy_mcp.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    expose:
      - "8000"
      - "8001"
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - mcp-recovery-service
      - mcp-green-duration-service
    restart: unless-stopped

  mcp-recovery-service:
    build:
      context: .
      dockerfile: mcp_servers/recovery/Dockerfile.recovery
    networks:
      - srs-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
    expose:
      - "8000"
    environment:
      - REDIS_URLS=redis://redis-lock-1:6379,redis://redis-lock-2:6379,redis://redis-lock-3:6379
    depends_on:
      haproxy-1:
        condition: service_started
      haproxy-2:
        condition: service_started
      semafori-tsdb-alpha:
        condition: service_started
      semafori-tsdb-beta:
        condition: service_started
      redis-lock-1:
        condition: service_healthy
      redis-lock-2:
        condition: service_healthy
      redis-lock-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000))\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  mcp-green-duration-service:
    build:
      context: .
      dockerfile: mcp_servers/green_duration/Dockerfile.green
    networks:
      - srs-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
    expose:
      - "8001"
    environment:
      - REDIS_URLS=redis://redis-lock-1:6379,redis://redis-lock-2:6379,redis://redis-lock-3:6379
    depends_on:
      haproxy-1:
        condition: service_started
      haproxy-2:
        condition: service_started
      semafori-tsdb-alpha:
        condition: service_started
      semafori-tsdb-beta:
        condition: service_started
      redis-lock-1:
        condition: service_healthy
      redis-lock-2:
        condition: service_healthy
      redis-lock-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8001))\""]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

  # =========================================================
  # 5. MONITORAGGIO
  # =========================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: srs-portainer
    command: -H unix:///var/run/docker.sock
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - srs-net
    restart: always

  grafana:
    image: grafana/grafana-oss:latest
    container_name: srs-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - srs-net
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    
  dozzle:
    image: amir20/dozzle:latest
    container_name: srs-log-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8888:8080
    restart: unless-stopped

volumes:
  portainer_data:
  influxdb_alpha_data:
  influxdb_beta_data:
  ollama_data:
  grafana_data:
