networks:
  srs-net:
    driver: bridge



services:
  influxdb:
    image: influxdb:2.7
    container_name: semafori-tsdb
    networks:
      - srs-net
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=srs_org
      - DOCKER_INFLUXDB_INIT_BUCKET=traffic_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken123
      - DOCKER_INFLUXDB_INIT_RETENTION=1d
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
      - ./dashboards:/docker-entrypoint-initdb.d
    restart: unless-stopped



  srs-ui:
    build:
      context: .
      dockerfile: simulator/webapp/Dockerfile.ui
    container_name: srs_ui
    networks:
      - srs-net
    ports:
      - "8080:8080"
    depends_on:
      - haproxy-1
      - haproxy-2
    restart: unless-stopped



  srs-simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile.nodo
    container_name: srs_nodes_simulator
    networks:
      - srs-net
    depends_on:
      - haproxy-1
      - haproxy-2
    restart: unless-stopped



  srs-controller:
    build:
      context: .
      dockerfile: controller/Dockerfile.controller
    container_name: srs_main_controller
    networks:
      - srs-net
    depends_on:
      - influxdb
      - haproxy-1
      - haproxy-2
    restart: unless-stopped




  emqx-1:
    image: emqx:5.3
    container_name: srs-emqx-1
    hostname: srs-emqx-1
    networks:
      - srs-net
    ports:
      - "18083:18083"
    environment:
      - EMQX_NODE_NAME=emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net,emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net]
      - EMQX_NODE__COOKIE=srs_secret_cookie
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1883' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped



  emqx-2:
    image: emqx:5.3
    container_name: srs-emqx-2
    hostname: srs-emqx-2
    networks:
      - srs-net
    ports:
      - "18084:18083"
    environment:
      - EMQX_NODE_NAME=emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@srs-emqx-1.srs-iot-traffic-lights_srs-net,emqx@srs-emqx-2.srs-iot-traffic-lights_srs-net]
      - EMQX_NODE__COOKIE=srs_secret_cookie
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1883' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped



  haproxy-1:
    image: haproxy:2.8
    container_name: srs-haproxy-1
    networks:
      - srs-net
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "1883:1883"
    depends_on:
      emqx-1:
        condition: service_healthy
      emqx-2:
        condition: service_healthy
    restart: unless-stopped



  haproxy-2:
    image: haproxy:2.8
    container_name: srs-haproxy-2
    networks:
      - srs-net
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "1884:1883"
    depends_on:
      emqx-1:
        condition: service_healthy
      emqx-2:
        condition: service_healthy
    restart: unless-stopped



  opencode-brain:
    build:
      context: ./opencode
      dockerfile: Dockerfile.opencode
    container_name: brain_server
    networks:
      - srs-net
    ports:
      - "4096:4096"
    depends_on:
      - mcp-recovery-service
      - mcp-green-duration-service
    environment:
      - OPENCODE_SERVER_PASSWORD=srs
    restart: unless-stopped



  srs-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile.bridge
    container_name: srs_bridge
    networks:
      - srs-net
    environment:
      - MQTT_BROKER=srs-haproxy-1
      - OPENCODE_URL=http://brain_server:4096
    depends_on:
      - opencode-brain
      - haproxy-1
    restart: unless-stopped



  mcp-recovery-service:
    build:
      context: ./mcp_servers/recovery
      dockerfile: Dockerfile.recovery
    container_name: mcp_recovery
    networks:
      - srs-net
    ports:
      - "8000:8000"
    depends_on:
      haproxy-1:
        condition: service_started
      haproxy-2:
        condition: service_started
      influxdb:
        condition: service_started
    restart: on-failure



  mcp-green-duration-service:
    build:
      context: ./mcp_servers/green_duration
      dockerfile: Dockerfile.green
    container_name: mcp_green_duration
    networks:
      - srs-net
    ports:
      - "8001:8001"
    depends_on:
      haproxy-1:
        condition: service_started
      haproxy-2:
        condition: service_started
      influxdb:
        condition: service_started
    restart: on-failure