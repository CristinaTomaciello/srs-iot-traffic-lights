global
    maxconn 1000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 10s
    timeout client 300s
    timeout server 300s

frontend ai_frontend
    bind *:4096
    default_backend ai_cluster

backend ai_cluster
    balance source
    
    server opencode-a srs-opencode-a:4096 check inter 5s fall 2 rise 2
    server opencode-b srs-opencode-b:4096 check inter 5s fall 2 rise 2
