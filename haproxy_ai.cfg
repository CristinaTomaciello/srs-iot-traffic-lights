global
    maxconn 1000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option http-server-close
    option forwardfor
    timeout connect 10s
    timeout client 300s
    timeout server 600s
    timeout queue 60s
    timeout tunnel 3600s

# --- BILANCIAMENTO OPENCODE (Porta 4096) ---
frontend ai_frontend
    bind *:4096
    default_backend ai_cluster

backend ai_cluster
    balance source
    server opencode-a srs-opencode-a:4096 check inter 5s fall 2 rise 2 maxconn 50
    server opencode-b srs-opencode-b:4096 check inter 5s fall 2 rise 2 maxconn 50
